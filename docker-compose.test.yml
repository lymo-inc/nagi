# Vanilla Postgres for `@nagi-js/postgres` integration tests.
# The store tests use unique per-test schemas (`nagi_test_<uuid7>`), so a single
# container instance handles the full suite. No pgmq extension required — the
# `@nagi-js/pgmq` package's own integration tests live elsewhere.
#
# Usage:
#   pnpm db:up      # start
#   pnpm test:integration
#   pnpm db:down    # stop
services:
  postgres:
    image: postgres:16-alpine
    container_name: nagi-test-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nagi_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nagi_test"]
      interval: 1s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data
